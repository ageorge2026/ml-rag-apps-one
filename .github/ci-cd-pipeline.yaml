name: CI/CD Build and GitOps Sync

on:
  push:
    branches:
      - main  # Fires automatically whenever you commit or push to main in Repo 1

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ ageorge2026 }}/standalone-calculator

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code from Repo 1
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Grabs the short Git SHA (e.g., a1b2c3d) to tag our image uniquely
      - name: Extract Git Commit SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Builds the image using your isolated docker/ subfolder layout
      # The PyTest validation executes inside this step automatically!
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .                          # Allows Docker to see src/ and docker/ folders
          file: ./docker/Dockerfile           # Points directly to your recipe location
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.sha_short }}
          cache-from: type=gha                # Leverages GitHub caching to speed up builds
          cache-to: type=gha,mode=max

      # Passes our short SHA tag down to the manifest update job below
      outputs:
        image_tag: ${{ steps.vars.outputs.sha_short }}

  update-manifests:
    needs: build-and-test
    runs-on: ubuntu-latest
    
    steps:
      # Checks out your Argo CD repository using your secure write token
      - name: Checkout Manifests Repository (Repo 2)
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/ml-ops-manifestsml-ops-manifests # 👈 Remember to replace 'Repo2' with your actual repo name
          token: ${{ secrets.REPO2_WRITE_TOKEN }}
          path: repo2

      # Opens the overlay, installs kustomize, and cleanly swaps out the image tag
      - name: Update Kustomize Image Tag
        run: |
          cd repo2/overlays/prod
          
          # Downloads a lightweight kustomize binary to the workspace
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          
          # Executes the intelligent search-and-replace command we discussed
          ./kustomize edit set image ghcr.io/${{ env.IMAGE_NAME }}=ghcr.io/${{ env.IMAGE_NAME }}:${{ needs.build-and-test.outputs.image_tag }}
          
          rm kustomize

      # Commits the fresh change back to your main manifest sequence
      - name: Commit and Push Changes to Repo 2
        run: |
          cd repo2
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          git add overlays/prod/kustomization.yaml
          git commit -m "automated-ci: update production image tag to ${{ needs.build-and-test.outputs.image_tag }} [skip ci]"
          git push origin main
